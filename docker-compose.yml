services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.rag
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
    env_file:
      - rag_pipeline/.env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_storage:
  neo4j_data:
