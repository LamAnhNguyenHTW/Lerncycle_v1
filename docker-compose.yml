services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.rag
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
    env_file:
      - rag_pipeline/.env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}

volumes:
  qdrant_storage:
